<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Settings &middot; CalAppt</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="CalAppt">
    <meta name="application-name" content="CalAppt">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=20260430-27">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <p class="eyebrow">CalAppt</p>
          <h1>Email Settings</h1>
          <p class="lede">Set the email address used for "Email weekly agenda" and "Email feature list".</p>
        </div>
        <div class="week-toolbar">
          <a class="ghost-button" href="./index.html">Back to Calendar</a>
        </div>
      </header>

      <main class="workspace">
        <section class="panel">
          <div class="panel-head calendar-head">
            <div>
              <p class="eyebrow">Your Email</p>
              <h2>Update Email</h2>
            </div>
          </div>

          <form id="emailSettingsForm" class="customer-form">
            <label class="field">
              <span>Email</span>
              <input
                id="userEmailInput"
                type="email"
                placeholder="Example: you@example.com"
                autocomplete="email"
                inputmode="email"
              >
            </label>
            <div class="customer-form-actions">
              <button id="emailClearBtn" class="ghost-button danger-button" type="button">Clear Email</button>
              <div class="customer-form-actions-right">
                <button class="primary-button" type="submit">Save</button>
              </div>
            </div>
            <p id="emailSavedStatus" class="appointment-empty" aria-live="polite"></p>
            <p class="appointment-empty">Note: The "From" address is controlled by your email app (Mail/Gmail). CalAppt can't force Gmail as the sender.</p>
          </form>
        </section>
      </main>
    </div>

    <script>
      (function () {
        const STORAGE_KEY = "coach_appointment_calendar_user_email";
        const form = document.getElementById("emailSettingsForm");
        const input = document.getElementById("userEmailInput");
        const clearBtn = document.getElementById("emailClearBtn");
        const status = document.getElementById("emailSavedStatus");

        const readEmail = () => {
          try {
            return window.localStorage.getItem(STORAGE_KEY) || "";
          } catch {
            return "";
          }
        };

        const writeEmail = (email) => {
          try {
            window.localStorage.setItem(STORAGE_KEY, email);
          } catch {}
        };

        const setStatus = (message) => {
          if (!status) return;
          status.textContent = message;
        };

        if (input) {
          input.value = readEmail();
        }
        setStatus("Saved email is stored on this device.");

        form?.addEventListener("submit", (event) => {
          event.preventDefault();
          const nextEmail = (input?.value || "").trim();
          writeEmail(nextEmail);
          setStatus(nextEmail ? `Saved: ${nextEmail}` : "Email cleared.");
        });

        clearBtn?.addEventListener("click", () => {
          if (input) input.value = "";
          writeEmail("");
          setStatus("Email cleared.");
        });
      })();
    </script>
  </body>
</html>
