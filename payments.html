<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments &middot; CalAppt</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20260428-1">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=20260427-2">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=20260427-2">
    <meta name="apple-mobile-web-app-title" content="CalAppt">
    <meta name="application-name" content="CalAppt">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=20260429-3">
  </head>
  <body class="page-payments">
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <div class="topbar-headline">
            <img class="topbar-logo" src="./apple-touch-icon.png?v=20260428-1" alt="CalAppt" width="54" height="54" decoding="async">
            <h1>Payments</h1>
          </div>
          <p class="lede">Track money received, receivables, and total billings for the month.</p>
        </div>
        <div class="week-toolbar">
          <a class="ghost-button" href="./index.html">Back to Calendar</a>
          <a class="ghost-button" href="./customers.html">Customer List</a>
        </div>
      </header>

      <main class="workspace">
        <section class="panel" aria-label="Monthly summary">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Billing</p>
              <h2>Month Summary</h2>
            </div>
          </div>

          <div class="calendar-month-row" aria-label="Select month">
            <button id="paymentsPrevMonthBtn" class="month-nav-button" type="button" aria-label="Previous month">&lt;</button>
            <p id="paymentsMonthLabel" class="calendar-month-label" aria-live="polite"></p>
            <button id="paymentsNextMonthBtn" class="month-nav-button" type="button" aria-label="Next month">&gt;</button>
          </div>

          <div class="payments-summary" role="list" aria-label="Monthly totals">
            <div class="payments-kpi" role="listitem">
              <span>Money Received</span>
              <strong id="paymentsReceived">$0.00</strong>
            </div>
            <div class="payments-kpi" role="listitem">
              <span>Receivables</span>
              <strong id="paymentsReceivables">$0.00</strong>
            </div>
            <div class="payments-kpi" role="listitem">
              <span>Total Earnings</span>
              <strong id="paymentsTotal">$0.00</strong>
            </div>
          </div>
        </section>

        <section class="panel" aria-label="Appointments and payments">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Customer Appointments</p>
              <h2>Payments This Month</h2>
            </div>
            <div id="paymentsCountChip" class="panel-chip">0</div>
          </div>

          <div id="paymentsList" class="payments-list"></div>
          <div id="paymentsEmpty" class="appointment-empty" hidden>No customer appointments found for this month.</div>
        </section>
      </main>
    </div>

    <script>
      (() => {
        const STORAGE_KEYS = {
          customers: "coach_appointment_calendar_customers",
          tasks: "coach_appointment_calendar_tasks",
          appointments: "coach_appointment_calendar_appointments"
        };

        const elements = {
          prevBtn: document.getElementById("paymentsPrevMonthBtn"),
          nextBtn: document.getElementById("paymentsNextMonthBtn"),
          monthLabel: document.getElementById("paymentsMonthLabel"),
          received: document.getElementById("paymentsReceived"),
          receivables: document.getElementById("paymentsReceivables"),
          total: document.getElementById("paymentsTotal"),
          list: document.getElementById("paymentsList"),
          empty: document.getElementById("paymentsEmpty"),
          countChip: document.getElementById("paymentsCountChip")
        };

        const safeJsonParse = (value, fallback) => {
          if (!value) return fallback;
          try {
            const parsed = JSON.parse(value);
            return parsed ?? fallback;
          } catch {
            return fallback;
          }
        };

        const readCustomers = () => {
          try {
            const parsed = safeJsonParse(window.localStorage.getItem(STORAGE_KEYS.customers), []);
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };

        const readTasks = () => {
          try {
            const parsed = safeJsonParse(window.localStorage.getItem(STORAGE_KEYS.tasks), []);
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };

        const readAppointments = () => {
          try {
            const parsed = safeJsonParse(window.localStorage.getItem(STORAGE_KEYS.appointments), []);
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };

        const writeAppointments = (nextAppointments) => {
          try {
            window.localStorage.setItem(STORAGE_KEYS.appointments, JSON.stringify(nextAppointments));
            return true;
          } catch {
            window.alert("Storage is full or unavailable on this device. Export a backup first, then clear old data.");
            return false;
          }
        };

        function escapeHtml(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function splitNameForSurnameSort(value) {
          const name = String(value || "").trim();
          const sentinel = "\uffff";
          if (!name) {
            return { surname: sentinel, given: sentinel, full: sentinel };
          }

          const commaIndex = name.indexOf(",");
          if (commaIndex !== -1) {
            const surname = name.slice(0, commaIndex).trim() || sentinel;
            const given = name.slice(commaIndex + 1).trim() || sentinel;
            return { surname, given, full: name };
          }

          const parts = name.split(/\s+/).filter(Boolean);
          if (parts.length <= 1) {
            return { surname: parts[0] || sentinel, given: sentinel, full: name };
          }

          const surname = parts[parts.length - 1] || sentinel;
          const given = parts.slice(0, -1).join(" ").trim() || sentinel;
          return { surname, given, full: name };
        }

        function formatNameSurnameFirst(value) {
          const raw = String(value || "").trim();
          if (!raw) return "";

          const sentinel = "\uffff";
          const parsed = splitNameForSurnameSort(raw);
          if (!parsed || parsed.full === sentinel) return raw;
          if (!parsed.given || parsed.given === sentinel) return raw;

          if (String(parsed.surname || "").trim().toLowerCase() === "customer") return raw;

          return `${parsed.surname}, ${parsed.given}`;
        }

        function formatDateKey(date) {
          const year = date.getFullYear();
          const month = `${date.getMonth() + 1}`.padStart(2, "0");
          const day = `${date.getDate()}`.padStart(2, "0");
          return `${year}-${month}-${day}`;
        }

        function parseDateKey(value) {
          if (!value) return null;
          const [year, month, day] = value.split("-").map(Number);
          if (!year || !month || !day) return null;
          return new Date(year, month - 1, day);
        }

        function formatWeekday(date) {
          return date.toLocaleDateString(undefined, { weekday: "short" });
        }

        function formatMonthDay(date) {
          return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
        }

        function formatMonthYear(date) {
          return date.toLocaleDateString(undefined, { month: "long", year: "numeric" });
        }

        function formatMinutes(minutes) {
          const value = Number(minutes);
          if (!Number.isFinite(value)) return "";
          const hours24 = Math.floor(value / 60);
          const mins = value % 60;
          const suffix = hours24 >= 12 ? "PM" : "AM";
          const hours12 = hours24 % 12 || 12;
          return `${hours12}:${String(mins).padStart(2, "0")} ${suffix}`;
        }

        function formatMoney(cents) {
          const amount = Number(cents);
          if (!Number.isFinite(amount) || amount <= 0) return "$0.00";
          return `$${(amount / 100).toFixed(2)}`;
        }

        function normalizeAmountCents(value) {
          const number = Number(value);
          if (!Number.isFinite(number)) return 0;
          return Math.max(0, Math.round(number));
        }

        function parseAmountToCents(value) {
          const raw = String(value || "").trim();
          if (!raw) return 0;
          const normalized = raw.replace(/[^0-9.-]/g, "");
          const number = Number(normalized);
          if (!Number.isFinite(number) || number <= 0) return 0;
          return Math.round(number * 100);
        }

        function formatCentsForInput(cents) {
          const amountCents = Number(cents);
          if (!Number.isFinite(amountCents) || amountCents <= 0) return "";
          return (amountCents / 100).toFixed(2);
        }

        function getStartOfMonth(date) {
          const next = new Date(date);
          next.setDate(1);
          next.setHours(0, 0, 0, 0);
          return next;
        }

        function shiftMonth(currentMonthStart, delta) {
          const next = getStartOfMonth(currentMonthStart);
          next.setMonth(next.getMonth() + delta);
          return getStartOfMonth(next);
        }

        let visibleMonthStart = getStartOfMonth(new Date());

        function getMonthRangeKeys(monthStart) {
          const start = getStartOfMonth(monthStart);
          const end = new Date(start.getFullYear(), start.getMonth() + 1, 0);
          return { startKey: formatDateKey(start), endKey: formatDateKey(end) };
        }

        function render() {
          const customers = readCustomers();
          const tasks = readTasks();
          const appointments = readAppointments();
          const customerById = new Map(customers.map((customer) => [customer?.id, customer]));
          const taskById = new Map(tasks.map((task) => [task?.id, task]));

          const { startKey, endKey } = getMonthRangeKeys(visibleMonthStart);
          if (elements.monthLabel) elements.monthLabel.textContent = formatMonthYear(visibleMonthStart);

          const monthAppointments = appointments
            .filter((appointment) => appointment?.entryType === "customer")
            .filter((appointment) => appointment?.dateKey >= startKey && appointment?.dateKey <= endKey)
            .slice()
            .sort((a, b) => {
              const dateCompare = String(a.dateKey || "").localeCompare(String(b.dateKey || ""));
              if (dateCompare) return dateCompare;
              return Number(a.startMinutes) - Number(b.startMinutes);
            });

          const totals = monthAppointments.reduce((acc, appointment) => {
            const cents = normalizeAmountCents(appointment?.amountCents);
            if (!cents) return acc;
            acc.billed += cents;
            if (appointment?.isPaid) {
              acc.received += cents;
            } else {
              acc.receivables += cents;
            }
            return acc;
          }, { billed: 0, received: 0, receivables: 0 });

          if (elements.received) elements.received.textContent = formatMoney(totals.received);
          if (elements.receivables) elements.receivables.textContent = formatMoney(totals.receivables);
          if (elements.total) elements.total.textContent = formatMoney(totals.billed);

          if (elements.countChip) elements.countChip.textContent = `${monthAppointments.length}`;

          if (elements.empty) {
            elements.empty.hidden = monthAppointments.length > 0;
          }

          if (!elements.list) return;

          elements.list.innerHTML = monthAppointments.map((appointment) => {
            const customer = customerById.get(appointment.entryId);
            const rawName = customer?.name || appointment.entryName || "Unknown Customer";
            const name = formatNameSurnameFirst(rawName) || rawName;
            const day = parseDateKey(appointment.dateKey);
            const dayLabel = day ? `${formatWeekday(day)}, ${formatMonthDay(day)}` : String(appointment.dateKey || "");
            const timeLabel = `${formatMinutes(appointment.startMinutes)} - ${formatMinutes(appointment.endMinutes)}`;
            const amountCents = normalizeAmountCents(appointment.amountCents);
            const paid = Boolean(appointment.isPaid);
            const itemLabel = `${dayLabel} ${timeLabel} ${name}`;

            return `
              <article class="payments-item" data-appointment-id="${escapeHtml(appointment.id)}" aria-label="${escapeHtml(itemLabel)}">
                <div class="payments-item-main">
                  <strong class="payments-item-title">${escapeHtml(name)}</strong>
                  <div class="payments-item-meta">${escapeHtml(dayLabel)} &middot; ${escapeHtml(timeLabel)}</div>
                </div>
                <div class="payments-item-controls">
                  <label class="payments-amount">
                    <span>Amount</span>
                    <input
                      class="payments-amount-input"
                      data-payment-field="amount"
                      data-appointment-id="${escapeHtml(appointment.id)}"
                      type="number"
                      inputmode="decimal"
                      min="0"
                      step="0.01"
                      placeholder="0.00"
                      value="${escapeHtml(formatCentsForInput(amountCents))}"
                    >
                  </label>
                  <label class="payments-paid">
                    <span>Paid</span>
                    <span class="payments-paid-toggle">
                      <input
                        class="payments-paid-checkbox"
                        data-payment-field="paid"
                        data-appointment-id="${escapeHtml(appointment.id)}"
                        type="checkbox"
                        ${paid ? "checked" : ""}
                      >
                      <span class="payments-paid-pill">Paid</span>
                    </span>
                  </label>
                </div>
              </article>
            `;
          }).join("");
        }

        function updateAppointmentField(appointmentId, field, value) {
          const appointments = readAppointments();
          const index = appointments.findIndex((entry) => entry?.id === appointmentId);
          if (index === -1) return;

          const current = appointments[index] || {};
          const next = { ...current };

          if (field === "amount") {
            next.amountCents = parseAmountToCents(value);
            if (!next.amountCents) next.isPaid = false;
          } else if (field === "paid") {
            next.isPaid = Boolean(value);
          } else {
            return;
          }

          appointments[index] = next;
          if (writeAppointments(appointments)) render();
        }

        elements.prevBtn?.addEventListener("click", () => {
          visibleMonthStart = shiftMonth(visibleMonthStart, -1);
          render();
        });
        elements.nextBtn?.addEventListener("click", () => {
          visibleMonthStart = shiftMonth(visibleMonthStart, 1);
          render();
        });

        elements.list?.addEventListener("change", (event) => {
          const target = event.target;
          const field = target?.getAttribute?.("data-payment-field") || "";
          const appointmentId = target?.getAttribute?.("data-appointment-id") || "";
          if (!field || !appointmentId) return;

          if (field === "paid") {
            updateAppointmentField(appointmentId, field, Boolean(target.checked));
            return;
          }

          updateAppointmentField(appointmentId, field, target.value || "");
        });

        render();
      })();
    </script>
  </body>
</html>
