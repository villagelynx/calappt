<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Settings &middot; CalAppt</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=20260428-1">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png?v=20260427-2">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png?v=20260427-2">
    <meta name="apple-mobile-web-app-title" content="CalAppt">
    <meta name="application-name" content="CalAppt">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=20260429-3">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <p class="eyebrow">CalAppt</p>
          <h1>Weather Settings</h1>
          <p class="lede">Set a city to show the weekly forecast in the schedule header.</p>
        </div>
        <div class="week-toolbar">
          <a class="ghost-button" href="./index.html">Back to Calendar</a>
        </div>
      </header>

      <main class="workspace">
        <section class="panel">
          <div class="panel-head calendar-head">
            <div>
              <p class="eyebrow">Weather City</p>
              <h2>Update City</h2>
            </div>
          </div>

          <form id="weatherSettingsForm" class="customer-form">
            <label class="field">
              <span>City</span>
              <input id="weatherCityInput" type="text" placeholder="Example: Vancouver, BC">
            </label>
            <div class="customer-form-actions">
              <button id="weatherClearBtn" class="ghost-button danger-button" type="button">Turn Off Weather</button>
              <div class="customer-form-actions-right">
                <button class="primary-button" type="submit">Save</button>
              </div>
            </div>
            <p id="weatherSavedStatus" class="appointment-empty" aria-live="polite"></p>
          </form>
        </section>
      </main>
    </div>

    <script>
      (function () {
        const STORAGE_KEY = "coach_appointment_calendar_weather_city";
        const form = document.getElementById("weatherSettingsForm");
        const input = document.getElementById("weatherCityInput");
        const clearBtn = document.getElementById("weatherClearBtn");
        const status = document.getElementById("weatherSavedStatus");

        const readCity = () => {
          try {
            return window.localStorage.getItem(STORAGE_KEY) || "";
          } catch {
            return "";
          }
        };

        const writeCity = (city) => {
          try {
            window.localStorage.setItem(STORAGE_KEY, city);
          } catch {}
        };

        const setStatus = (message) => {
          if (!status) return;
          status.textContent = message;
        };

        if (input) {
          input.value = readCity();
        }
        setStatus("Saved city is stored on this device.");

        form?.addEventListener("submit", (event) => {
          event.preventDefault();
          const nextCity = (input?.value || "").trim();
          writeCity(nextCity);
          setStatus(nextCity ? `Saved: ${nextCity}` : "Weather turned off.");
        });

        clearBtn?.addEventListener("click", () => {
          if (input) input.value = "";
          writeCity("");
          setStatus("Weather turned off.");
        });
      })();
    </script>
  </body>
</html>
