<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Statement &middot; CalAppt</title>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="CalAppt">
    <meta name="application-name" content="CalAppt">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=20260430-31">
  </head>
  <body class="page-monthly-statement">
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <div class="topbar-headline">
            <img class="topbar-logo" src="./apple-touch-icon.png" alt="CalAppt" width="54" height="54" decoding="async">
            <h1>Monthly Statement</h1>
          </div>
          <p class="lede">See money received, receivables, and all billed sessions for the month.</p>
        </div>
        <div class="week-toolbar">
          <a class="ghost-button" href="./index.html">Back to Calendar</a>
          <a class="ghost-button" href="./payments.html">Payments</a>
        </div>
      </header>

      <main class="workspace">
        <section class="panel" aria-label="Monthly statement summary">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Billing</p>
              <h2>Statement Summary</h2>
            </div>
          </div>

          <div class="calendar-month-row" aria-label="Select month">
            <button id="statementPrevMonthBtn" class="month-nav-button" type="button" aria-label="Previous month">&lt;</button>
            <p id="statementMonthLabel" class="calendar-month-label" aria-live="polite"></p>
            <button id="statementNextMonthBtn" class="month-nav-button" type="button" aria-label="Next month">&gt;</button>
          </div>

          <div class="payments-summary" role="list" aria-label="Statement totals">
            <div class="payments-kpi" role="listitem">
              <span>Money Received</span>
              <strong id="statementReceived">$0.00</strong>
            </div>
            <div class="payments-kpi" role="listitem">
              <span>Receivables</span>
              <strong id="statementReceivables">$0.00</strong>
            </div>
            <div class="payments-kpi" role="listitem">
              <span>Monthly Total Earnings</span>
              <strong id="statementBilled">$0.00</strong>
            </div>
          </div>
        </section>

        <section class="panel" aria-label="Monthly statement details">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Details</p>
              <h2 id="statementDetailsTitle">Sessions</h2>
            </div>
            <div id="statementCountChip" class="panel-chip">0</div>
          </div>

          <div id="statementList" class="yearly-breakdown-list"></div>
          <div id="statementEmpty" class="appointment-empty" hidden>No customer appointments found for this month.</div>
        </section>
      </main>
    </div>

    <script>
      (() => {
        const STORAGE_KEYS = {
          customers: "coach_appointment_calendar_customers",
          appointments: "coach_appointment_calendar_appointments"
        };

        const elements = {
          prevBtn: document.getElementById("statementPrevMonthBtn"),
          nextBtn: document.getElementById("statementNextMonthBtn"),
          monthLabel: document.getElementById("statementMonthLabel"),
          received: document.getElementById("statementReceived"),
          receivables: document.getElementById("statementReceivables"),
          billed: document.getElementById("statementBilled"),
          list: document.getElementById("statementList"),
          empty: document.getElementById("statementEmpty"),
          countChip: document.getElementById("statementCountChip"),
          detailsTitle: document.getElementById("statementDetailsTitle")
        };

        const safeJsonParse = (value, fallback) => {
          if (!value) return fallback;
          try {
            const parsed = JSON.parse(value);
            return parsed ?? fallback;
          } catch {
            return fallback;
          }
        };

        const readCustomers = () => {
          try {
            const parsed = safeJsonParse(localStorage.getItem(STORAGE_KEYS.customers), []);
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };

        const readAppointments = () => {
          try {
            const parsed = safeJsonParse(localStorage.getItem(STORAGE_KEYS.appointments), []);
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };

        function escapeHtml(value) {
          return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function splitNameForSurnameSort(value) {
          const name = String(value || "").trim();
          const sentinel = "\uffff";
          if (!name) {
            return { surname: sentinel, given: sentinel, full: sentinel };
          }

          const commaIndex = name.indexOf(",");
          if (commaIndex !== -1) {
            const surname = name.slice(0, commaIndex).trim() || sentinel;
            const given = name.slice(commaIndex + 1).trim() || sentinel;
            return { surname, given, full: name };
          }

          const parts = name.split(/\s+/).filter(Boolean);
          if (parts.length <= 1) {
            return { surname: parts[0] || sentinel, given: sentinel, full: name };
          }

          const surname = parts[parts.length - 1] || sentinel;
          const given = parts.slice(0, -1).join(" ").trim() || sentinel;
          return { surname, given, full: name };
        }

        function formatNameSurnameFirst(value) {
          const raw = String(value || "").trim();
          if (!raw) return "";

          const sentinel = "\uffff";
          const parsed = splitNameForSurnameSort(raw);
          if (!parsed || parsed.full === sentinel) return raw;
          if (!parsed.given || parsed.given === sentinel) return raw;

          if (String(parsed.surname || "").trim().toLowerCase() === "customer") return raw;

          return `${parsed.surname}, ${parsed.given}`;
        }

        function normalizeAmountCents(value) {
          const number = Number(value);
          if (!Number.isFinite(number)) return 0;
          return Math.max(0, Math.round(number));
        }

        function formatMoney(cents) {
          const amount = Number(cents);
          if (!Number.isFinite(amount) || amount <= 0) return "$0.00";
          return `$${(amount / 100).toFixed(2)}`;
        }

        function formatDateKey(date) {
          const year = date.getFullYear();
          const month = `${date.getMonth() + 1}`.padStart(2, "0");
          const day = `${date.getDate()}`.padStart(2, "0");
          return `${year}-${month}-${day}`;
        }

        function parseDateKey(value) {
          if (!value) return null;
          const [year, month, day] = value.split("-").map(Number);
          if (!year || !month || !day) return null;
          return new Date(year, month - 1, day);
        }

        function formatWeekday(date) {
          return date.toLocaleDateString(undefined, { weekday: "short" });
        }

        function formatMonthDay(date) {
          return date.toLocaleDateString(undefined, { month: "short", day: "numeric" });
        }

        function formatMonthYear(date) {
          return date.toLocaleDateString(undefined, { month: "long", year: "numeric" });
        }

        function formatMinutes(minutes) {
          const value = Number(minutes);
          if (!Number.isFinite(value)) return "";
          const hours24 = Math.floor(value / 60);
          const mins = value % 60;
          const suffix = hours24 >= 12 ? "PM" : "AM";
          const hours12 = hours24 % 12 || 12;
          return `${hours12}:${String(mins).padStart(2, "0")} ${suffix}`;
        }

        function getStartOfMonth(date) {
          const next = new Date(date);
          next.setDate(1);
          next.setHours(0, 0, 0, 0);
          return next;
        }

        function shiftMonth(currentMonthStart, delta) {
          const next = getStartOfMonth(currentMonthStart);
          next.setMonth(next.getMonth() + delta);
          return getStartOfMonth(next);
        }

        function parseMonthParam(value) {
          const raw = String(value || "").trim();
          const match = raw.match(/^(\d{4})-(\d{2})$/);
          if (!match) return null;
          const year = Number(match[1]);
          const month = Number(match[2]);
          if (!Number.isFinite(year) || !Number.isFinite(month)) return null;
          if (month < 1 || month > 12) return null;
          const date = new Date(year, month - 1, 1);
          return Number.isFinite(date.getTime()) ? date : null;
        }

        function getMonthRangeKeys(monthStart) {
          const start = getStartOfMonth(monthStart);
          const end = new Date(start.getFullYear(), start.getMonth() + 1, 0);
          return { startKey: formatDateKey(start), endKey: formatDateKey(end) };
        }

        const queryMonth = (() => {
          const params = new URLSearchParams(window.location.search);
          return parseMonthParam(params.get("month"));
        })();

        let visibleMonthStart = getStartOfMonth(queryMonth ?? new Date());

        function render() {
          const customers = readCustomers();
          const customerById = new Map(customers.map((customer) => [customer?.id, customer]));
          const appointments = readAppointments();

          const { startKey, endKey } = getMonthRangeKeys(visibleMonthStart);

          if (elements.monthLabel) elements.monthLabel.textContent = formatMonthYear(visibleMonthStart);
          if (elements.detailsTitle) elements.detailsTitle.textContent = `Sessions - ${formatMonthYear(visibleMonthStart)}`;

          const monthAppointments = appointments
            .filter((appointment) => appointment?.entryType === "customer")
            .filter((appointment) => appointment?.dateKey >= startKey && appointment?.dateKey <= endKey)
            .slice()
            .sort((a, b) => {
              const dateCompare = String(a.dateKey || "").localeCompare(String(b.dateKey || ""));
              if (dateCompare) return dateCompare;
              return Number(a.startMinutes) - Number(b.startMinutes);
            });

          const totals = monthAppointments.reduce((acc, appointment) => {
            const cents = normalizeAmountCents(appointment?.amountCents);
            if (!cents) return acc;
            acc.billed += cents;
            if (appointment?.isPaid) {
              acc.received += cents;
            } else {
              acc.receivables += cents;
            }
            return acc;
          }, { billed: 0, received: 0, receivables: 0 });

          if (elements.received) elements.received.textContent = formatMoney(totals.received);
          if (elements.receivables) elements.receivables.textContent = formatMoney(totals.receivables);
          if (elements.billed) elements.billed.textContent = formatMoney(totals.billed);
          if (elements.countChip) elements.countChip.textContent = `${monthAppointments.length}`;

          if (elements.empty) {
            elements.empty.hidden = monthAppointments.length > 0;
          }

          if (!elements.list) return;

          const rowsMarkup = monthAppointments.map((appointment) => {
            const customer = customerById.get(appointment.entryId);
            const rawName = customer?.name || appointment.entryName || "Unknown Customer";
            const name = formatNameSurnameFirst(rawName) || rawName;

            const day = parseDateKey(appointment.dateKey);
            const dayLabel = day ? `${formatWeekday(day)}, ${formatMonthDay(day)}` : String(appointment.dateKey || "");
            const timeLabel = `${formatMinutes(appointment.startMinutes)} - ${formatMinutes(appointment.endMinutes)}`;

            const court = String(appointment.court || "").trim();
            const detailParts = [`${dayLabel} \u00B7 ${timeLabel}`, court ? `Court: ${court}` : ""].filter(Boolean);

            const amountCents = normalizeAmountCents(appointment.amountCents);
            const paid = Boolean(appointment.isPaid);
            const statusClass = paid ? "statement-status is-paid" : "statement-status is-due";
            const statusText = paid ? "Paid" : "Due";
            const itemLabel = `${dayLabel} ${timeLabel} ${name}`;

            return `
              <article class="yearly-month-item" aria-label="${escapeHtml(itemLabel)}">
                <div class="yearly-month-main">
                  <strong class="yearly-month-title">${escapeHtml(name)}</strong>
                  <div class="yearly-month-meta">${escapeHtml(detailParts.join(" \u00B7 "))}</div>
                </div>
                <div class="yearly-month-totals">
                  <div class="yearly-month-total">
                    <span>Amount</span>
                    <strong>${escapeHtml(formatMoney(amountCents))}</strong>
                  </div>
                  <div class="yearly-month-total">
                    <span>Status</span>
                    <strong class="${escapeHtml(statusClass)}">${escapeHtml(statusText)}</strong>
                  </div>
                </div>
              </article>
            `;
          }).join("");

          const sessionCountLabel = monthAppointments.length === 1 ? "1 session" : `${monthAppointments.length} sessions`;

          const totalsRowMarkup = `
            <article class="yearly-month-item yearly-totals-item" aria-label="Month totals">
              <div class="yearly-month-main">
                <strong class="yearly-month-title">Totals</strong>
                <div class="yearly-month-meta">${escapeHtml(sessionCountLabel)}</div>
              </div>
              <div class="yearly-month-totals">
                <div class="yearly-month-total">
                  <span>Received</span>
                  <strong>${escapeHtml(formatMoney(totals.received))}</strong>
                </div>
                <div class="yearly-month-total">
                  <span>Receivables</span>
                  <strong>${escapeHtml(formatMoney(totals.receivables))}</strong>
                </div>
                <div class="yearly-month-total">
                  <span>Billed</span>
                  <strong>${escapeHtml(formatMoney(totals.billed))}</strong>
                </div>
              </div>
            </article>
          `;

          elements.list.innerHTML = `${rowsMarkup}${totalsRowMarkup}`;

          const url = new URL(window.location.href);
          const monthParam = `${visibleMonthStart.getFullYear()}-${String(visibleMonthStart.getMonth() + 1).padStart(2, "0")}`;
          try {
            localStorage.setItem("coach_appointment_calendar_statement_month", monthParam);
          } catch {}
          url.searchParams.set("month", monthParam);
          window.history.replaceState(null, "", url.toString());
        }

        elements.prevBtn?.addEventListener("click", () => {
          visibleMonthStart = shiftMonth(visibleMonthStart, -1);
          render();
        });
        elements.nextBtn?.addEventListener("click", () => {
          visibleMonthStart = shiftMonth(visibleMonthStart, 1);
          render();
        });

        render();
      })();
    </script>
  </body>
</html>
